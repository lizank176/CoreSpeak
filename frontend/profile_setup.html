<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreSpeak - Completa tu perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="gradient-bg min-vh-100 d-flex justify-content-center align-items-start">
        <div class="container mt-4">
            <div class="row justify-content-center">
                <div class="login-card registrar shadow-lg p-4 rounded-4 col-12 col-md-8 col-lg-6">
                    <div class="text-center mb-3 logo">
                        <img src="img/logo.png" alt="CoreSpeak" class="logo-img">
                    </div>
                    <h3 class="text-center mb-2">Completa tu perfil de aprendizaje</h3>
                    <p class="text-center text-muted mb-4">Guardaremos esta información para personalizar los retos diarios.</p>
                    <div id="profile-setup-error" class="alert alert-danger py-2 px-3 small mb-3 d-none" role="alert"></div>

                    <form id="profile-setup-form">
                        <div class="mb-3">
                            <label class="form-label" for="setup-idioma-ui">Idioma de la interfaz</label>
                            <select id="setup-idioma-ui" class="form-select">
                                <option value="es">Español</option>
                                <option value="en">English</option>
                                <option value="fr">Français</option>
                                <option value="uk">Українська</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="setup-idioma-nativo">Idioma nativo</label>
                            <select id="setup-idioma-nativo" class="form-select">
                                <option value="es">Español</option>
                                <option value="en">Inglés</option>
                                <option value="uk">Ucraniano</option>
                                <option value="fr">Francés</option>
                                <option value="de">Alemán</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="setup-idioma-objetivo">Idioma objetivo</label>
                            <select id="setup-idioma-objetivo" class="form-select">
                                <option value="en">Inglés</option>
                                <option value="uk">Ucraniano</option>
                                <option value="fr">Francés</option>
                                <option value="es">Español</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="setup-intereses">Intereses (separados por coma)</label>
                            <input id="setup-intereses" type="text" class="form-control" placeholder="Viajes, tecnología, cine...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="setup-ocupacion">¿Dónde trabajas? (opcional)</label>
                            <input id="setup-ocupacion" type="text" class="form-control" placeholder="Ej: Marketing, Docencia, Salud...">
                        </div>
                        <button id="profile-setup-btn" type="button" class="btn btn-primary w-100 login-btn">
                            Guardar y continuar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
