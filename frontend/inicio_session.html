<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreSpeak - Iniciar sesión</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <!-- Fondo degradado -->
    <div class="gradient-bg d-flex justify-content-center align-items-center min-vh-100">
        <div class="container">
            <div class="row justify-content-center align-items-center ">
                
                <div class="login-card shadow-lg p-4 rounded-4 col-12 col-md-8 col-lg-5">

                <!-- Logo -->
                <div class="text-center mb-3 logo ">
                    <a href="dashboard.html" class="text-decoration-none d-inline-block"><img src="img/logo.png" alt="CoreSpeak" class="logo-img"></a>
                </div>

                <h3 class="text-center mb-3" data-i18n="login.title">Iniciar sesión</h3>
                <p class="text-center text-muted mb-4" data-i18n="login.lead">Ingresa a tu cuenta para continuar aprendiendo</p>

                <div id="login-error" class="alert alert-danger py-2 px-3 small mb-3 d-none" role="alert" aria-live="polite"></div>

                <form id="login-form">

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label" data-i18n="login.email">Correo electrónico</label>
                        <input id="login-email" type="email" class="form-control" data-i18n-placeholder="login.phEmail" placeholder="tu@email.com" autocomplete="email">
                    </div>

                    <!-- Contraseña -->
                    <div class="mb-3">
                        <label class="form-label" data-i18n="login.password">Contraseña</label>
                        <div class="input-group">
                            <input id="login-password" type="password" class="form-control" placeholder="••••••••" autocomplete="current-password">
                            <button id="toggle-login-password" class="btn btn-outline-secondary password-visibility-btn" type="button" aria-label="Mostrar contraseña" title="Mostrar contraseña">
                                <img src="img/eye-closed.svg" alt="" class="password-eye-icon" width="22" height="14">
                            </button>
                        </div>
                    </div>

                    <!-- Botón -->
                    <button id="login-btn" type="button" class="btn btn-primary w-100 login-btn iniciar" data-i18n="login.submit">
                        Iniciar sesion
                    </button>


                </form>

                <!-- Enlaces -->
                <div class="text-center mt-3">
                    <a href="#" class="small"><span data-i18n="login.forgot">¿Olvidaste tu contraseña?</span></a>
                </div>

                <div class="text-center mt-2 small">
                    <span data-i18n="login.noAccount">¿No tienes cuenta?</span>
                    <a href="registrarse.html" class="register-link"><span data-i18n="login.register">Regístrate aquí</span></a>
                </div>
            </div>
        </div>  
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
