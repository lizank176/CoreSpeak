<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreSpeak - Crear cuenta</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="styles.css">

</head>
<body>

    <!-- Fondo degradado -->
    <div class="gradient-bg min-vh-100 d-flex justify-content-center align-items-start ">

        <!-- Contenedor principal -->
        <div class="container mt-4">
            <!-- Flecha volver -->
            <a href="#" class="back-arrow flecha d-flex align-items-center col-12 col-md-8 col-lg-6 mx-auto mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" 
                    class="bi bi-arrow-left">
                    <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
                </svg>
                <span class="ms-1" data-i18n="register.back">Volver</span>
            </a>
            <div class="row justify-content-center">
                
                <div class="login-card registrar shadow-lg p-4 rounded-4 col-12 col-md-8 col-lg-6">

                    <!-- Logo -->
                    <div class="text-center mb-3 logo">
                        <a href="dashboard.html" class="text-decoration-none d-inline-block"><img src="img/logo.png" alt="CoreSpeak" class="logo-img"></a>
                    </div>

                    <h3 class="text-center mb-2" data-i18n="register.title">Crear cuenta</h3>
                    <p class="text-center text-muted mb-4" data-i18n="register.lead">
                        Únete a CoreSpeak y comienza tu viaje de aprendizaje
                    </p>
                    <div id="register-error" class="alert alert-danger py-2 px-3 small mb-3 d-none" role="alert" aria-live="polite"></div>

                    <form id="register-form">

                        <!-- Nombre y Apellido -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label" data-i18n="register.name">Nombre</label>
                                <input id="register-nombre" type="text" class="form-control" placeholder="Juan" autocomplete="given-name">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label" data-i18n="register.surname">Apellido</label>
                                <input id="register-apellido" type="text" class="form-control" placeholder="Pérez" autocomplete="family-name">
                            </div>
                        </div>

                        <!-- Fecha de nacimiento -->
                        <div class="mb-3">
                            <label class="form-label" data-i18n="register.birth">Fecha de nacimiento</label>
                            <input type="date" class="form-control">
                        </div>

                        <!-- Correo -->
                        <div class="mb-3">
                            <label class="form-label" data-i18n="register.email">Correo electrónico</label>
                            <input id="register-email" type="email" class="form-control" data-i18n-placeholder="login.phEmail" placeholder="tu@email.com" autocomplete="email">
                        </div>

                        <!-- Contraseña y confirmación -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label" data-i18n="register.password">Contraseña</label>
                                <div class="input-group">
                                    <input id="register-password" type="password" class="form-control" placeholder="••••••••" autocomplete="new-password">
                                    <button id="toggle-register-password" class="btn btn-outline-secondary password-visibility-btn" type="button" aria-label="Mostrar contraseñas" title="Mostrar contraseñas">
                                        <img src="img/eye-closed.svg" alt="" class="password-eye-icon" width="22" height="14">
                                    </button>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" data-i18n="register.confirm">Confirmar contraseña</label>
                                <div class="input-group">
                                    <input id="register-password-confirm" type="password" class="form-control" placeholder="••••••••">
                                    <button id="toggle-register-password-confirm" class="btn btn-outline-secondary password-visibility-btn" type="button" aria-label="Mostrar confirmación de contraseña" title="Mostrar confirmación de contraseña">
                                        <img src="img/eye-closed.svg" alt="" class="password-eye-icon" width="22" height="14">
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="register-consent">
                            <label class="form-check-label small" for="register-consent">
                                Acepto los términos, política de privacidad y tratamiento de datos (RGPD).
                            </label>
                        </div>

                        <!-- Botón -->
                        <button id="register-btn" type="button" class="btn btn-primary w-100 login-btn" data-i18n="register.submit">
                            Crear cuenta
                        </button>


                        <p class="text-center small mt-3 text-muted" data-i18n="register.terms">
                            Al registrarte, aceptas nuestros términos de servicio y política de privacidad
                        </p>

                    </form>

                    <!-- Enlace a login -->
                    <div class="text-center mt-2 small">
                        <span data-i18n="register.hasAccount">¿Ya tienes cuenta?</span>
                        <a href="inicio_session.html" class="register-link"><span data-i18n="register.loginLink">Inicia sesión aquí</span></a>
                    </div>

                </div>
            </div>
        </div>

    </div>

<script src="app.js"></script>
</body>
</html>
