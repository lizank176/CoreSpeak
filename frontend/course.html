<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreSpeak - Dynamic Course</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="cursos.css">
</head>
<body>
    <div class="container-fluid p-0">
        <div class="dashboard-header">
            <div class="container-fluid">
                <nav class="dashboard-nav d-flex flex-wrap align-items-center w-100 justify-content-between">
                    <div class="col-12 col-md-auto">
                        <a href="dashboard.html" class="text-decoration-none"><img src="img/logo.png" alt="CoreSpeak Logo" class="dashboard-logo"></a>
                    </div>
                </nav>
            </div>
        </div>
    </div>

    <div class="container main-content">
        <div class="row mb-4">
            <div class="col-12">
                <a href="dashboard.html" class="back-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
                    </svg>
                    <span id="course-back-label" data-i18n="back">Volver</span>
                </a>
            </div>
        </div>

        <div class="course-intro mb-5">
            <div class="d-flex align-items-center mb-2">
                <img id="course-flag" src="https://flagcdn.com/w160/gb.png" alt="Flag" class="flag-circle">
                <h2 id="course-title" class="course-title ms-3 mb-0">Loading course...</h2>
            </div>
            <p id="course-progress-text" class="text-muted ms-1 mb-3"></p>
            <div class="progress" role="progressbar" style="height: 6px;">
                <div id="course-progress-bar" class="progress-bar" style="width: 0%"></div>
            </div>
        </div>

        <div class="lessons-section">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="section-title" id="course-lessons-heading">Lessons</h5>
                <span id="course-available" class="badge-available"></span>
            </div>

            <div id="course-lessons-list"></div>

            <div class="alert tip-box mt-4 d-flex" role="alert">
                <div class="me-3">
                    <span class="tip-icon">💡</span>
                </div>
                <div>
                    <h6 class="alert-heading fw-bold mb-1" id="course-tip-title">Learning Tip</h6>
                    <p class="mb-0 text-muted small" id="course-tip-body">Las lecciones se organizan según el idioma y el nivel que eliges.</p>
                </div>
            </div>
            <br><br>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
