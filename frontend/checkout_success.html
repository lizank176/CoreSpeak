<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago exitoso - CoreSpeak</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width:780px;">
      <div class="card-body p-4 p-md-5">
        <h1 class="h3 text-success mb-3">Pago realizado con éxito</h1>
        <p id="checkout-success-status" class="text-muted mb-4">Verificando tu pago...</p>
        <div class="table-responsive">
          <table class="table table-sm">
            <tbody>
              <tr><th scope="row">Estado</th><td id="checkout-session-status">-</td></tr>
              <tr><th scope="row">Email</th><td id="checkout-session-email">-</td></tr>
              <tr><th scope="row">Sesión</th><td id="checkout-session-id">-</td></tr>
              <tr><th scope="row">Total</th><td id="checkout-session-total">-</td></tr>
            </tbody>
          </table>
        </div>
        <div class="d-flex gap-2">
          <a href="dashboard.html" class="btn btn-primary">Ir al dashboard</a>
          <a href="pricing.html" class="btn btn-outline-secondary">Volver a precios</a>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    (async function () {
      const statusEl = document.getElementById("checkout-success-status");
      const auth = typeof requireAuth === "function" ? requireAuth() : null;
      if (!auth) {
        statusEl.textContent = "Inicia sesión para verificar tu pago.";
        return;
      }
      const sessionId = new URLSearchParams(window.location.search).get("session_id");
      if (!sessionId) {
        statusEl.textContent = "No se encontró el identificador de sesión.";
        return;
      }
      const res = await fetch(apiUrl("/api/payments/stripe/session/" + encodeURIComponent(sessionId)), { headers: apiHeaders() });
      const data = await res.json().catch(function () { return {}; });
      if (!res.ok) {
        statusEl.textContent = data.detail || "No se pudo verificar el pago.";
        return;
      }
      document.getElementById("checkout-session-status").textContent = data.payment_status || "-";
      document.getElementById("checkout-session-email").textContent = data.customer_email || "-";
      document.getElementById("checkout-session-id").textContent = data.id || sessionId;
      const amount = Number(data.amount_total || 0) / 100;
      const cur = String(data.currency || "eur").toUpperCase();
      document.getElementById("checkout-session-total").textContent = amount.toFixed(2) + " " + cur;
      statusEl.textContent = data.payment_status === "paid"
        ? "Tu cuenta premium ya está activa."
        : "Pago creado, pendiente de confirmación.";
    })();
  </script>
</body>
</html>
